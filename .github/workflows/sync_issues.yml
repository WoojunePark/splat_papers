name: Sync Closed Inbox Issues

# Integrate phase: when an "inbox"-labeled issue is closed,
# sync its comments back to the paper's ## My Notes and mark status: read.

on:
  issues:
    types: [closed]

permissions:
  contents: write   # needed to commit the updated .md file back to main
  issues: read      # needed to read issue comments

jobs:
  sync:
    # Only run if the closed issue has the "inbox" label
    if: contains(github.event.issue.labels.*.name, 'inbox')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch issue comments and patch paper file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python - <<'PYEOF'
          import json, os, re, sys, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          # ----------------------------------------------------------------
          # Config from environment
          # ----------------------------------------------------------------
          token = os.environ["GITHUB_TOKEN"]
          issue_number = int(os.environ["ISSUE_NUMBER"])
          repo = os.environ.get("GITHUB_REPOSITORY", "")  # owner/repo
          papers_dir = Path("papers")

          # ----------------------------------------------------------------
          # Fetch issue + comments via REST API
          # ----------------------------------------------------------------
          def gh_get(path: str) -> dict | list:
              url = f"https://api.github.com/repos/{repo}{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          comments_data = gh_get(f"/issues/{issue_number}/comments")
          user_comments = [
              c for c in comments_data
              if c.get("user", {}).get("type", "") != "Bot"
              and c.get("body", "").strip()
          ]
          print(f"Issue #{issue_number}: {len(user_comments)} user comment(s) to sync")

          # ----------------------------------------------------------------
          # Find matching paper .md
          # ----------------------------------------------------------------
          def parse_frontmatter(text):
              lines = text.splitlines()
              if not lines or lines[0].strip() != "---":
                  return {}
              fields = {}
              for line in lines[1:]:
                  if line.strip() == "---":
                      break
                  m = re.match(r'^(\w[\w-]*):\s*(.*)', line)
                  if m:
                      fields[m.group(1)] = m.group(2).strip()
              return fields

          matched = None
          for md in sorted(papers_dir.glob("*.md")):
              if md.name.startswith("_"):
                  continue
              text = md.read_text(encoding="utf-8")
              if parse_frontmatter(text).get("issue", "").strip() == str(issue_number):
                  matched = md
                  break

          if matched is None:
              print(f"No paper found with issue: {issue_number} — nothing to update.")
              sys.exit(0)

          print(f"Matched: {matched.name}")
          text = matched.read_text(encoding="utf-8")

          # ----------------------------------------------------------------
          # Patch frontmatter fields (status, issue)
          # ----------------------------------------------------------------
          def patch_field(text, field, value):
              lines = text.splitlines(keepends=True)
              in_front = False
              result = []
              for line in lines:
                  if line.strip() == "---":
                      in_front = not in_front
                      result.append(line)
                      continue
                  if in_front:
                      m = re.match(r'^(\w[\w-]*):\s*(.*)', line)
                      if m and m.group(1) == field:
                          eol = "\r\n" if line.endswith("\r\n") else "\n"
                          line = f"{field}: {value}{eol}"
                  result.append(line)
              return "".join(result)

          text = patch_field(text, "status", "read")
          text = patch_field(text, "issue", "")

          # ----------------------------------------------------------------
          # Append comments to ## My Notes
          # ----------------------------------------------------------------
          def format_comment(c):
              body = c.get("body", "").strip()
              created = c.get("created_at", "")
              date_str = ""
              if created:
                  try:
                      dt = datetime.fromisoformat(created.replace("Z", "+00:00"))
                      date_str = dt.astimezone(timezone.utc).strftime("%Y-%m-%d")
                  except Exception:
                      date_str = created[:10]
              prefix = f"**[Note from GitHub{', ' + date_str if date_str else ''}]**"
              indented = "\n".join(f"> {ln}" if ln.strip() else ">" for ln in body.splitlines())
              return f"{prefix}\n{indented}"

          note_blocks = [format_comment(c) for c in user_comments]
          if note_blocks:
              block = "\n\n".join(note_blocks)
              notes_pat = re.compile(r'^## My Notes\s*$', re.MULTILINE)
              m = notes_pat.search(text)
              if m:
                  insert_pos = m.end()
                  rest = text[insert_pos:]
                  leading = len(rest) - len(rest.lstrip("\n"))
                  insert_pos += leading
                  text = text[:insert_pos] + "\n" + block + "\n" + text[insert_pos:]
              else:
                  text = text.rstrip() + "\n\n## My Notes\n\n" + block + "\n"

          matched.write_text(text, encoding="utf-8")
          print(f"✓ Patched {matched.name}")
          PYEOF

      - name: Rebuild index
        run: |
          python scripts/validate.py || true
          python scripts/build_index.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/ INDEX.md tags/
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "sync: issue #${{ github.event.issue.number }} → My Notes"
          git push
