name: Sync Closed Inbox Issues

# Integrate phase: when an "inbox"-labeled issue is closed,
# sync its comments back to the paper's ## My Notes and mark status: read.

on:
  issues:
    types: [closed]

permissions:
  contents: write   # needed to commit the updated .md file back to main
  issues: read      # needed to read issue comments

jobs:
  sync:
    # Only run if the closed issue has the "inbox" label
    if: contains(github.event.issue.labels.*.name, 'inbox')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch issue comments and patch paper file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/sync_issues.py --issue ${{ github.event.issue.number }} --no-rebuild

      - name: Rebuild index
        run: |
          python scripts/validate.py || true
          python scripts/build_index.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/ INDEX.md tags/
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "sync: issue #${{ github.event.issue.number }} → My Notes"
          git push
